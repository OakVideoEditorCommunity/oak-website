services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oak
      POSTGRES_PASSWORD: oak
      POSTGRES_DB: oak_website
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oak -d oak_website"]
      interval: 5s
      timeout: 5s
      retries: 5

  docs-builder:
    image: ghcr.io/oakvideoeditorcommunity/oak-website-docs-builder:latest
    volumes:
      - ./../oak-docs:/data/oak-docs:ro
      - docs-html:/data/docs-html
    environment:
      DOCS_SRC_DIR: /data/oak-docs
      DOCS_OUT_DIR: /data/docs-html
    command: ["build-docs"]

  backend:
    image: ghcr.io/oakvideoeditorcommunity/oak-website-backend:latest
    env_file:
      - .env
    environment:
      APP__DATABASE__URL: postgres://oak:oak@db/oak_website
      APP__SERVER__HOST: 0.0.0.0
      APP__SERVER__PORT: 8080
      APP__DOCS__HTML_DIR: /data/docs-html
      APP__DOCS__GIT_URL: https://github.com/OakVideoEditorCommunity/oak-docs.git
      APP__DOCS__UPDATE_INTERVAL_HOURS: 24
    volumes:
      - docs-html:/data/docs-html:ro
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
      docs-builder:
        condition: service_completed_successfully
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  frontend:
    image: ghcr.io/oakvideoeditorcommunity/oak-website-frontend:latest
    env_file:
      - .env
    environment:
      # Internal URL used for server-side (SSR) requests; stable compose DNS.
      NUXT_API_BASE_URL: http://backend:8080
      # NUXT_PUBLIC_API_BASE_URL stays empty so the browser uses same-origin
      # /api/... URLs; NUXT_PUBLIC_SITE_URL comes from .env.
    ports:
      - "3000:3000"
    depends_on:
      - backend
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Watchtower monitors the GHCR images and recreates containers when new tags are published.
  # We use the actively maintained containrrr/watchtower image; the original v2tec/watchtower
  # fork is no longer updated.
  watchtower:
    image: nickfedor/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: 3600
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_ROLLING_RESTART: "true"
    restart: unless-stopped

volumes:
  pgdata:
  docs-html:
